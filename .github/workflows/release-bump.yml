name: Bump Version and Open Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6 # bump to v6 (Dependabot)
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Bump version with Poetry
        id: bump
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          case "${BUMP}" in
            patch|minor|major) ;;
            *) echo "Invalid bump type: ${BUMP}" >&2; exit 1 ;;
          esac
          poetry version "${BUMP}"
          NEW_VERSION=$(poetry version -s)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          MAJOR_MINOR=$(echo "$NEW_VERSION" | awk -F. '{print $1"."$2}')
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      # Commit handled by peter-evans/create-pull-request

      - name: Create release PR
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "feat/release-${{ steps.bump.outputs.new_version }}"
          title: "chore(release): v${{ steps.bump.outputs.new_version }}"
          body: |
            Automated version bump to v${{ steps.bump.outputs.new_version }}.

            - Bumps `pyproject.toml` version using Poetry
            - On merge, the following happens automatically:
              1. `release-tag.yml` creates Git tag `v${{ steps.bump.outputs.new_version }}`
              2. `docker-build.yml` builds and pushes GHCR image tags:
                 - `v${{ steps.bump.outputs.new_version }}`
                 - `${{ steps.bump.outputs.major_minor }}`
                 - `main`
                 - `latest`
                 - `sha-*`
            
            No manual steps required after merge - everything is automated!
          commit-message: "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"
          labels: release
          draft: false
